<!-- #form to be accessed by angular
will bind #form template variable to a form of type NgForm object.
Will be able to acess input variables inside the form.
(ngSubmit) is another form's related feature provided by angular -->
<form
    #form="ngForm"
    (ngSubmit)="onSubmit(form)"
>
    <h2>Login</h2>
    <div class="control-row">
        <div class="control no-margin">
            <label for="email">Email</label>
            <!-- ngModel makes angular aware of this input. You have to use the name
              property in conjunction with ngModel
            <input id="email" type="email" name="email" ngModel /> -->
            <input
                id="email"
                type="email"
                name="email"
                ngModel
                required
                email
                #email="ngModel"
            />
        </div>
        <div class="control no-margin">
            <label for="password">Password</label>
            <input
                id="password"
                type="password"
                name="password"
                ngModel
                required
                minlength="6"
                #password="ngModel"
            />
        </div>
        <button class="button">Login</button>
    </div>
    @if ( email.touched &&
        email.dirty &&
        email.invalid ) {
        <p class="control-error">
            Invalid email address entered.
        </p>
    }
    @if ( password.touched &&
        password.dirty &&
        password.invalid ) {
        <p class="control-error">
            Invalid password entered - must be at least 6 characters long.
        </p>
    }

</form>
